name: Test Coverage

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build packages
        run: |
          npm run build --workspace=@kartoffel/utils
          npm run build --workspace=@kartoffel/ui-library

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload ui-library coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/ui-library/coverage/lcov.info
          flags: ui-library
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload utils coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/utils/coverage/lcov.info
          flags: utils
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload kartoffel-web coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./apps/kartoffel-web/coverage/lcov.info
          flags: kartoffel-web
          token: ${{ secrets.CODECOV_TOKEN }}
